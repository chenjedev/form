<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic document metadata and stylesheet link -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <!-- Decorative background shapes (purely visual) -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <!-- Main centered page container -->
    <main class="page-wrap">
        <!-- Sign-up form card (novalidate lets JS handle validation) -->
        <form id="signup" class="glass-card" novalidate>
            <h1>Create Account</h1>
            <p class="subtitle">Join now with secure signup validation.</p>

            <!-- Full name input field + validation message area -->
            <div class="field-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="John Doe" autocomplete="name">
                <small class="error-text" id="nameError"></small>
            </div>

            <!-- Email input field + validation message area -->
            <div class="field-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="name@example.com" autocomplete="email">
                <small class="error-text" id="emailError"></small>
            </div>

            <!-- Password rules hint + validation message area -->
            <div class="field-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a strong password" autocomplete="new-password">
                <small class="hint-text">At least 8 chars, 1 uppercase, 1 lowercase, 1 number, 1 symbol.</small>
                <small class="error-text" id="passwordError"></small>
            </div>

            <!-- Confirm password field + validation message area -->
            <div class="field-group">
                <label for="passwordconfirm">Confirm Password</label>
                <input type="password" id="passwordconfirm" name="passwordconfirm" placeholder="Repeat your password" autocomplete="new-password">
                <small class="error-text" id="confirmError"></small>
            </div>

            <!-- Submit action and success feedback -->
            <button type="submit">Create Account</button>
            <p class="success-text" id="successText" aria-live="polite"></p>
        </form>
    </main>

    <!-- External JavaScript for all validation logic -->
    <script src="script.js" defer></script>
</body>
</html>
